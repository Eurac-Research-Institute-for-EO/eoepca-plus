apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  labels:
    eoepca/is-root-app: "true"
    eoepca/app-name: loki-stack
spec:
  project: eoepca
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.2
    helm:
      values: |
        loki:
          config:
            schema_config:
              configs:
              - from: "2024-08-01"
                index:
                  period: 24h
                  prefix: loki_index_
                object_store: s3
                schema: v12
                store: boltdb-shipper
            storage_config:
              aws:
                bucketnames: logging
                insecure: false
                region: default
                s3: https://minio.develop.eoepca.org/logging
                s3forcepathstyle: true
                sse_encryption: false
              boltdb_shipper:
                cache_ttl: 24h
                shared_store: s3
          enabled: true
          env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                key: AWS_ACCESS_KEY_ID
                name: loki-s3-credentials
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                key: AWS_SECRET_ACCESS_KEY
                name: loki-s3-credentials
          - name: AWS_DEFAULT_REGION
            value: default
          isDefault: false
          requestTimeout: 30m
          serviceMonitor:
            additionalLabels:
              app.kubernetes.io/part-of: kube-prometheus-stack
            enabled: true
        promtail:
          enabled: true
          image:
            tag: 2.9.5
          tolerations:
          - effect: NoSchedule
            key: hub.jupyter.org/dedicated
            operator: Equal
            value: user
          - effect: NoSchedule
            key: hub.jupyter.org_dedicated
            operator: Equal
            value: user
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: nvidia.com_gpu
            operator: Exists
  destination:
    name: in-cluster
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true