apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgo-core
  namespace: argocd
spec:
  project: eoepca
  source:
    repoURL: 'registry.developers.crunchydata.com/crunchydata'
    targetRevision: 5.7.4
    path: 'pgo'
    chart: pgo
    helm:
      releaseName: pgo
      values: |
        disable_check_for_upgrades: true
        singleNamespace: true
  destination:
    name: in-cluster
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
