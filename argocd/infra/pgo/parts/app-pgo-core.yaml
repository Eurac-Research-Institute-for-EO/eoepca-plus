apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgo-core
  namespace: argocd
  labels:
    eoepca/app-name: pgo
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: 'registry.developers.crunchydata.com/crunchydata'
      path: 'pgo'
      chart: pgo
      targetRevision: 5.7.4
      helm:
        releaseName: pgo
        valueFiles:
          - $values/argocd/infra/pgo/parts/values/values-pgo.yaml
  destination:
    name: in-cluster
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
