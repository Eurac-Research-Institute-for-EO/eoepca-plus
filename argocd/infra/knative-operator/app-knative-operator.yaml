apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knative-operator
  namespace: argocd
  labels:
    eoepca/is-root-app: "true"
    eoepca/app-name: na-knative-operator
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  source:
    repoURL: 'https://knative.github.io/operator'
    chart: knative-operator
    targetRevision: 1.17.1
    helm:
      releaseName: knative-operator
  destination:
    name: in-cluster
    namespace: knative-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
