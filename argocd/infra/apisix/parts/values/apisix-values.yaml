# Note: This file is *not* used if APISIX is installed via the iam-bb
# Helm chart. Values are taken from iam-values.yaml instead in this case.
# However, for the EOEPCA 2.0.0-beta2 release, APISIX is still deployed
# separately in the demo environment and so this file remains relevant.
# This may change in the future.

service:
  type: ClusterIP

apisix:

  enableIPv6: false
  enableServerTokens: false

  ssl:
    enabled: true
    # -- Specifies the name of Secret contains trusted CA certificates in the PEM format used to verify the certificate when APISIX needs to do SSL/TLS handshaking with external services (e.g. etcd)
    existingCASecret: "apx-all-tls"
    # -- Filename be used in the apisix.ssl.existingCASecret
    certCAFilename: "tls.crt"

  # -- Set APISIX plugin attributes, see [config-default.yaml](https://github.com/apache/apisix/blob/master/conf/config-default.yaml#L376) for more details
  pluginAttrs:
    redirect:
      https_port: 443

etcd:
  # Added: Set Cluster-specific storage class
  persistence:
    storageClass: managed-nfs-storage-retain
    size: 8Gi

# -- Ingress controller configuration
ingress-controller:
  enabled: true
  config:
    apisix:
      serviceNamespace: ingress-apisix
