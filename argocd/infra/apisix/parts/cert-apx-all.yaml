# Wildcard certificate for preliminary APISIX ingress *.develop.eoepca.org
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: apx-all-tls
  namespace: ingress-apisix
spec:
  secretName: apx-all-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  isCA: false
  usages:
    - server auth
    - client auth
  dnsNames:
    - "*.develop.eoepca.org"
  issuerRef:
    name: letsencrypt-dns-prod
    kind: ClusterIssuer
