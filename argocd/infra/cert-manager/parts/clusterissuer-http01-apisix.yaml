apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-http01-apisix
spec:
  acme:
    email: james.hinton@telespazio.com
    privateKeySecretRef:
      name: letsencrypt-http01-apisix
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - http01:
          ingress:
            ingressClassName: apisix
            routeType: ApisixRoute
