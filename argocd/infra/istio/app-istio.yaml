apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio
  namespace: argocd
  labels:
    eoepca/is-root-app: "true"
    eoepca/app-name: istio
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: base
    targetRevision: 1.24.2
    helm:
      releaseName: istio-base
  destination:
    name: in-cluster
    namespace: istio-system
  syncPolicy:
    - CreateNamespace=true
--- 
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  labels:
    eoepca/is-root-app: "false"
    eoepca/app-name: istio
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: istiod
    targetRevision: 1.24.2
    helm:
      releaseName: istiod
  destination:
    name: in-cluster
    namespace: istio-system
  syncPolicy:
    - CreateNamespace=true
--- 
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  labels:
    eoepca/is-root-app: "false" # Is this a root app ? 
    eoepca/app-name: istio
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: gateway
    targetRevision: 1.24.2
    helm:
      releaseName: istio-ingress
      valuesObject:
        service:
          type: ClusterIP
  destination:
    name: in-cluster
    namespace: istio-ingress
  syncPolicy:
    - CreateNamespace=true