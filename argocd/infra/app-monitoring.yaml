apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    eoepca/is-root-app: "true"
    eoepca/app-name: kube-prometheus-stack
spec:
  project: eoepca
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 73.2.0
    helm:
      values: |
        grafana:
          enabled: true
          grafana.ini:
            server:
              root_url: "%(protocol)s://monitoring.develop.eoepca.org/"
              
        alertmanager:
          enabled: true

        prometheus:
          enabled: true

        prometheusAgent:
          enabled: false

        thanosRuler:
          enabled: false

        prometheus-node-exporter:
          hostPort:
            enabled: false

        prometheusOperator:
          scrapeConfig:
            enabled: false
  destination:
    name: in-cluster
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true # mitigate problem with annotations length
