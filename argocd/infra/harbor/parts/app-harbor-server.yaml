apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  labels:
    eoepca/app-name: harbor
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  source:
    repoURL: 'https://helm.goharbor.io'
    chart: harbor
    targetRevision: 1.7.3

    helm:
      releaseName: harbor
      valuesObject:
        expose:
          ingress:
            annotations:
              kubernetes.io/ingress.class: apisix
              cert-manager.io/cluster-issuer: letsencrypt-http01-apisix
              k8s.apisix.apache.org/upstream-read-timeout: "600s"
              k8s.apisix.apache.org/enable-cors: "true"
              k8s.apisix.apache.org/http-to-https: "true"
            hosts:
              core: harbor.apx.develop.eoepca.org
          tls:
            enabled: true
            certSource: secret
            secret:
              secretName: "harbor-apx-tls"

        persistence:
          persistentVolumeClaim:
            registry:
              storageClass: managed-nfs-storage-retain
            chartmuseum:
              storageClass: managed-nfs-storage-retain
            jobservice:
              storageClass: managed-nfs-storage-retain
            database:
              storageClass: managed-nfs-storage-retain
            redis:
              storageClass: managed-nfs-storage-retain
            trivy:
              storageClass: managed-nfs-storage-retain

        externalURL: https://harbor.apx.develop.eoepca.org
        # initial password for logging in with user "admin"
        harborAdminPassword:
          valueFrom:
            secretKeyRef:
              name: harbor-auth
              key: rootPassword

        chartmuseum:
          enabled: false
        trivy:
          enabled: false
        notary:
          enabled: false

  destination:
    name: in-cluster
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
