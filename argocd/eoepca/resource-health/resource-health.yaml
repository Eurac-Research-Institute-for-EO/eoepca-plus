apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-health
  namespace: argocd
spec:
  project: eoepca
  source:
    repoURL: 'https://github.com/EOEPCA/resource-health'
    path: resource-health-reference-deployment
    targetRevision: deploy-develop
    helm:
      valuesObject:
        global:
          defaultInternalIssuerRef:
            name: eoepca-ca-clusterissuer

        opensearch:
          securityConfig:
            config:
              data:
                config.yml: |-
                  _meta:
                    type: "config"
                    config_version: 2

                  config:
                    dynamic:
                      kibana:
                        multitenancy_enabled: true
                        server_username: 'dashboards-client'
                        index: '.opensearch-dashboards'
                      do_not_fail_on_forbidden: false

                      http:
                        anonymous_auth_enabled: false
                      authc:
                        basic_internal_auth_domain:
                          description: "Authenticate via HTTP Basic against internal users database"
                          http_enabled: true
                          transport_enabled: true
                          order: 2
                          http_authenticator:
                            type: basic
                            challenge: true
                          authentication_backend:
                            type: intern
                        clientcert_auth_domain:
                          description: "Authenticate via SSL client certificates"
                          http_enabled: true
                          transport_enabled: false
                          order: 1
                          http_authenticator:
                            type: clientcert
                            config:
                              username_attribute: cn
                            challenge: false
                          authentication_backend:
                            type: noop
                        openid_auth_domain:
                          http_enabled: true
                          transport_enabled: true
                          order: 0
                          http_authenticator:
                            type: openid
                            challenge: false
                            config:
                              subject_key: preferred_username
                              roles_key: roles
                              # jwt_header: X-Access-Token
                              openid_connect_url: "https://iam-auth.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
                          authentication_backend:
                            type: noop

        opensearch-dashboards:
          config:
            opensearch_dashboards.yml:
              server:
                basePath: "/dashboards"
                ssl:
                  enabled: false
              opensearch:
                requestHeadersAllowlist: [ authorization,securitytenant,x-access-token,x-id-token,x-userinfo,x-refresh-token ]
              opensearch_security:
                auth:
                  #type: "basicauth"
                  type: "jwt"
                  #multiple_auth_enabled: true

        ## Example health checks to deploy with the resource health BB itself
        resource-health:
          telemetry_api:
            environmentFixed:
              - name: FAST_API_ROOT_PATH
                value: "/api/telemetry"

          check_api:
            environmentFixed:
              - name: FAST_API_ROOT_PATH
                value: "/api/healthchecks"

          web:
            environmentFixed:
              - name: NEXT_PUBLIC_CHECK_MANAGER_ENDPOINT
                value: https://resource-health.apx.develop.eoepca.org/api/healthchecks
              - name: NEXT_PUBLIC_TELEMETRY_ENDPOINT
                value: https://resource-health.apx.develop.eoepca.org/api/telemetry/v1

          healthchecks:
            checks:
            - name: hourly-mockapi-check
              schedule: "@hourly"
              # This is an empty requirements file
              requirements: "https://gist.githubusercontent.com/tilowiklundSensmetry/a9fefe2873b731b483f554607a82deaa/raw/1136a82ca3c8f28b1ad4d895871514185927dd1c/requirements.txt"
              script: "https://raw.githubusercontent.com/EOEPCA/resource-health/refs/tags/v0.1.0-demo/pytest-health/instrumentation/examples/mock_api_check.py"
              env:
                - name: MOCK_API_HOST
                  value: http://resource-health-mockapi:5000

            - name: daily-trivial-check
              ## Every day at 08:00
              schedule: "0 8 * * *"
              # This is an empty requirements file
              requirements: "https://gist.githubusercontent.com/tilowiklundSensmetry/a9fefe2873b731b483f554607a82deaa/raw/1136a82ca3c8f28b1ad4d895871514185927dd1c/requirements.txt"
              script: "https://raw.githubusercontent.com/EOEPCA/resource-health/refs/tags/v0.1.0-demo/pytest-health/instrumentation/examples/trivial_check.py"

            - name: hourly-simple-http-check
              schedule: "@hourly"
              # This is an empty requirements file
              requirements: "https://gist.githubusercontent.com/tilowiklundSensmetry/a9fefe2873b731b483f554607a82deaa/raw/1136a82ca3c8f28b1ad4d895871514185927dd1c/requirements.txt"
              script: "https://gist.githubusercontent.com/tilowiklundSensmetry/b75b3bf435e366b2fd5155a41d8f1cb9/raw/892e0e89d078f1f2683b89a1101e31683f77dcee/health_check.py"

            - name: hourly-simple-openeo-check
              schedule: "@hourly"
              requirements: "https://gist.githubusercontent.com/soxofaan/7a634cfb0cc6bc0e8281d152a270ea4e/raw/ef77bc9b2c70cc070259715fea63e288026bb6b8/requirements.txt"
              script: "https://gist.githubusercontent.com/soxofaan/7a634cfb0cc6bc0e8281d152a270ea4e/raw/ef77bc9b2c70cc070259715fea63e288026bb6b8/test_cdse.py"

            - name: daily-data-access-check
              schedule: "0 8 * * *"
              # This is an empty base64 encoding
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/data_access_tests.py?raw=true"
              env:
                - name: DATA_ACCESS_HOST
                  value: https://eoapi.develop.eoepca.org

            - name: daily-iam-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/iam_tests.py?raw=true"
              env:
                - name: OPEN_ID_CONFIGURATION_HOST
                  value: https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known
                - name: OPA_ENDPOINT
                  value: http://iam-opal-opal-client.iam.svc.cluster.local:8181/
                - name: IDENTITY_API_ENDPOINT
                  value: http://identity-api.iam.svc.cluster.local:8080/

            - name: daily-data-mlops-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/mlops_tests.py?raw=true"
              env:
                - name: SHARING_HUB_HOST
                  value: https://sharinghub.develop.eoepca.org
                - name: MFLOW_SHARING_HUB_HOST
                  value: https://sharinghub.p2.csgroup.space

            - name: daily-resource-discovery-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/resource_discovery_tests.py?raw=true"
              env:
                - name: RESOURCE_CATALOGUE_ENDPOINT
                  value: https://resource-catalogue.develop.eoepca.org

            - name: daily-resource-registration-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/resource_registration_tests.py?raw=true"
              env:
                - name: HARVESTER_WORKFLOW_ENGINE_HOST
                  value: https://registration-harvester-api.develop.eoepca.org
                - name: HARVESTER_WORKFLOW_ENGINE_USERNAME
                  value: "eoepca"
                - name: HARVESTER_WORKFLOW_ENGINE_PASSWORD
                  value: "eoepca"
                - name: REGISTRATION_API_ENDPOINT
                  value: https://registration-api.develop.eoepca.org/

            - name: daily-workspace-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/workspace_tests.py?raw=true"
              env:
                - name: WORKSPACE_HOST
                  value: https://workspace-api.apx.develop.eoepca.org

            - name: daily-processing-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/2.0.0-beta2/pytest-health/lib/BB-examples/generic_test.py?raw=true"
              env:
                - name: GENERIC_ENDPOINT
                  value: https://zoo.develop.eoepca.org/swagger-ui/oapip/

  destination:
    namespace: resource-health
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
