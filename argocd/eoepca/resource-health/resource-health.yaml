apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-health
  namespace: argocd
spec:
  project: eoepca
  source:
    repoURL: 'https://github.com/EOEPCA/resource-health'
    path: resource-health-reference-deployment
    targetRevision: deploy-develop
    helm:
      valuesObject:
        global:
          defaultInternalIssuerRef:
            name: eoepca-ca-clusterissuer

        opensearch:
          securityConfig:
            config:
              data:
                config.yml: |-
                  _meta:
                    type: "config"
                    config_version: 2

                  config:
                    dynamic:
                      kibana:
                        multitenancy_enabled: true
                        server_username: 'dashboards-client'
                        index: '.opensearch-dashboards'
                      do_not_fail_on_forbidden: false

                      http:
                        anonymous_auth_enabled: false
                      authc:
                        basic_internal_auth_domain:
                          description: "Authenticate via HTTP Basic against internal users database"
                          http_enabled: true
                          transport_enabled: true
                          order: 2
                          http_authenticator:
                            type: basic
                            challenge: true
                          authentication_backend:
                            type: intern
                        clientcert_auth_domain:
                          description: "Authenticate via SSL client certificates"
                          http_enabled: true
                          transport_enabled: false
                          order: 1
                          http_authenticator:
                            type: clientcert
                            config:
                              username_attribute: cn
                            challenge: false
                          authentication_backend:
                            type: noop
                        openid_auth_domain:
                          http_enabled: true
                          transport_enabled: true
                          order: 0
                          http_authenticator:
                            type: openid
                            challenge: false
                            config:
                              subject_key: preferred_username
                              roles_key: roles
                              # jwt_header: X-Access-Token
                              openid_connect_url: "https://iam-auth.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
                          authentication_backend:
                            type: noop

        opensearch-dashboards:
          config:
            opensearch_dashboards.yml:
              server:
                basePath: "/dashboards"
                ssl:
                  enabled: false
              opensearch:
                requestHeadersAllowlist: [ authorization,securitytenant,x-access-token,x-id-token,x-userinfo,x-refresh-token ]
              opensearch_security:
                auth:
                  #type: "basicauth"
                  type: "jwt"
                  #multiple_auth_enabled: true

        ## Example health checks to deploy with the resource health BB itself
        resource-health:
          telemetry_api:
            environmentFixed:
              - name: FAST_API_ROOT_PATH
                value: "/api/telemetry"

          check_api:
            environmentFixed:
              - name: FAST_API_ROOT_PATH
                value: "/api/healthchecks"
              - name: OPEN_ID_CONNECT_URL
                value: "https://iam-auth.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
              - name: OPEN_ID_CONNECT_AUDIENCE
                value: "account"

            use_hook_configmap: True
            hooks:
              oidc_auth_hooks.py: |
                from check_api.hook_utils import *

                from eoepca_security import OIDCProxyScheme, Tokens
                from typing import TypedDict
                import os


                class UserInfo(TypedDict):
                    userid: str
                    username: str
                    access_token: str
                    refresh_token: str | None


                def get_fastapi_security() -> OIDCProxyScheme:
                    return OIDCProxyScheme(
                        openIdConnectUrl=os.environ["OPEN_ID_CONNECT_URL"],
                        audience=os.environ["OPEN_ID_CONNECT_AUDIENCE"],
                        id_token_header="x-id-token",
                        refresh_token_header="x-refresh-token",
                        auth_token_header="Authorization",
                        auth_token_in_authorization=True,
                        auto_error=True,  ## Set False to allow unauthenticated access!
                        scheme_name="OIDC behind auth proxy",
                    )


                def on_auth(tokens: Tokens | None) -> UserInfo:
                    print("ON AUTH")

                    if tokens is None or tokens["auth"] is None:  # or tokens['id'] is None:
                        raise APIException(
                            Error(
                                status="403",
                                code="MissingTokens",
                                title="Missing authentication or ID token",
                                detail="Potentially missing authenticating proxy",
                            )
                        )

                    claims = {}
                    claims.update(tokens["auth"].decoded["payload"])
                    if tokens["id"] is not None:
                        claims.update(tokens["id"].decoded)

                    user_id_claim = os.environ.get("RH_CHECK_USER_ID_CLAIM") or "sub"
                    username_claim = os.environ.get("RH_CHECK_USERNAME_CLAIM") or "preferred_username"

                    user_id = claims.get(user_id_claim)
                    username = claims.get(username_claim)

                    if user_id is None or username is None:
                        print(claims)
                        raise APIException(
                            Error(
                                status="401",
                                code="Missing user id/name",
                                title="Missing user identification",
                                detail="Username or user id missing",
                            )
                        )

                    return UserInfo(
                        userid=user_id,
                        username=username,
                        access_token=tokens["auth"].raw,
                        refresh_token=tokens["refresh"].raw if tokens["refresh"] else None,
                    )


                def on_template_access(userinfo: UserInfo, template: CheckTemplate) -> bool:
                    print("ON TEMPLATE_ACCESS")

                    if userinfo["username"] != "bob" and template.id != "simple_ping":
                        return False

                    return True


                def on_check_create(userinfo: UserInfo, check: InCheckAttributes) -> bool:
                    print("ON CHECK CREATE")

                    return True


                def on_check_remove(userinfo: UserInfo, check: OutCheck) -> bool:
                    print("ON CHECK REMOVE")

                    return True


                def on_check_access(userinfo: UserInfo, check: OutCheck) -> bool:
                    print("ON CHECK ACCESS")

                    return True


                def on_check_run(userinfo: UserInfo, check: OutCheck) -> bool:
                    print("ON CHECK RUN")

                    return True


                ## For the k8s backend

                async def get_k8s_config(userinfo: UserInfo) -> K8sConfiguration:
                    return await k8s_config_from_cluster()
                    

                def get_k8s_namespace(userinfo: UserInfo) -> str:
                    return "resource-health"


                def on_k8s_cronjob_access(
                    userinfo: UserInfo, client: K8sClient, cronjob: CronJob
                ) -> bool:
                    return cronjob.metadata.annotations.get("owner") == userinfo["username"]


                def on_k8s_cronjob_create(
                    userinfo: UserInfo, client: K8sClient, cronjob: CronJob
                ) -> bool:
                    print("on_k8s_cronjob_create")

                    ## Ensure cronjob is tagged with correct owner

                    if (
                        "owner" in cronjob.metadata.annotations
                        and cronjob.metadata.annotations["owner"] != userinfo["username"]
                    ):
                        return False

                    cronjob.metadata.annotations["owner"] = userinfo["username"]

                    return True


                def on_k8s_cronjob_remove(
                    userinfo: UserInfo, client: K8sClient, cronjob: CronJob
                ) -> bool:
                    print("on_k8s_cronjob_remove")
                    return True

                def on_k8s_cronjob_run(userinfo: UserInfo, client: K8sClient, cronjob: CronJob) -> bool:
                    print("on_k8s_cronjob_run")
                    return True

          web:
            environmentFixed:
              - name: NEXT_PUBLIC_CHECK_MANAGER_ENDPOINT
                value: https://resource-health.apx.develop.eoepca.org/api/healthchecks/v1
              - name: NEXT_PUBLIC_TELEMETRY_ENDPOINT
                value: https://resource-health.apx.develop.eoepca.org/api/telemetry/v1

          healthchecks:
            use_template_configmap: True
            templates:
              ping_template.py: |
                from check_backends.k8s_backend.template_utils import *
                from typing import TypedDict

                SIMPLE_PING_SRC = """from os import environ
                import requests

                GENERIC_ENDPOINT: str = environ["GENERIC_ENDPOINT"]
                EXPECTED_STATUS_CODE: int = int(environ["EXPECTED_STATUS_CODE"])


                def test_ping() -> None:
                    response = requests.get(
                        GENERIC_ENDPOINT,
                    )
                    assert response.status_code == EXPECTED_STATUS_CODE
                """


                class SimplePingArguments(BaseModel):
                    endpoint: str = Field(json_schema_extra={"format": "textarea"})
                    expected_status_code: int = Field(ge=100, lt=600, default=200)


                SimplePing = simple_runner_template(
                    template_id="simple_ping",
                    argument_type=SimplePingArguments,
                    label="Simple ping template",
                    description="Simple template with preset script for pinging single endpoint.",
                    script_url=src_to_data_url(SIMPLE_PING_SRC),
                    runner_env=lambda template_args, userinfo: {
                        "GENERIC_ENDPOINT": template_args.endpoint,
                        "EXPECTED_STATUS_CODE": str(template_args.expected_status_code),
                    },
                    user_id=lambda template_args, userinfo: userinfo["username"],
                    otlp_tls_secret="resource-health-healthchecks-certificate",
                )

              script_template.py: |
                from check_backends.k8s_backend.template_utils import *


                class ScriptTemplateArguments(BaseModel):
                    script: str = Field(json_schema_extra={"format": "textarea"})
                    requirements: str = Field(json_schema_extra={"format": "textarea"}, default="")


                GenericScriptTemplate = simple_runner_template(
                    template_id="generic_script_template",
                    argument_type=ScriptTemplateArguments,
                    label="Generic script template",
                    description="Runs a user-provided pytest script from a specified remote or data url",
                    script_url=lambda template_args, userinfo: template_args.script,
                    requirements_url=lambda template_args, userinfo: template_args.requirements,
                    user_id=lambda template_args, userinfo: userinfo["username"],
                    otlp_tls_secret="resource-health-healthchecks-certificate",
                )

              telemetry_access.py: |
                from check_backends.k8s_backend.template_utils import *
                import os


                class TelemetryAccessArguments(BaseModel):
                    script: str = Field(json_schema_extra={"format": "textarea"})
                    requirements: str = Field(json_schema_extra={"format": "textarea"}, default="")


                TelemetryAccessTemplate = simple_runner_template(
                    template_id="telemetry_access_template",
                    argument_type=TelemetryAccessArguments,
                    label="Script with telemetry access",
                    description="Health check template that runs a userscript with telemetry access on localhost:8080",
                    script_url=lambda template_args, userinfo: template_args.script,
                    requirements_url=lambda template_args, userinfo: template_args.requirements,
                    user_id=lambda template_args, userinfo: userinfo["username"],
                    otlp_tls_secret="resource-health-healthchecks-certificate",
                    proxy=True,
                    proxy_oidc_client_secret=(
                        "resource-health-iam-client-credentials",
                        "client_id",
                        "client_secret",
                    ),
                    proxy_oidc_refresh_token_secret=lambda template_args, userinfo: (
                        f"resource-health-{userinfo['username']}-offline-secret",
                        "offline_token",
                    ),
                    proxy_oidc_url=os.environ.get("OPEN_ID_CONNECT_URL"),
                )

            checks:
            - name: hourly-mockapi-check
              schedule: "@hourly"
              # This is an empty requirements file
              requirements: "https://gist.githubusercontent.com/tilowiklundSensmetry/a9fefe2873b731b483f554607a82deaa/raw/1136a82ca3c8f28b1ad4d895871514185927dd1c/requirements.txt"
              script: "https://raw.githubusercontent.com/EOEPCA/resource-health/refs/tags/v0.1.0-demo/pytest-health/instrumentation/examples/mock_api_check.py"
              env:
                - name: MOCK_API_HOST
                  value: http://resource-health-mockapi:5000
              annotations:
                owner: "bob"

            - name: daily-trivial-check
              ## Every day at 08:00
              schedule: "0 8 * * *"
              # This is an empty requirements file
              requirements: "https://gist.githubusercontent.com/tilowiklundSensmetry/a9fefe2873b731b483f554607a82deaa/raw/1136a82ca3c8f28b1ad4d895871514185927dd1c/requirements.txt"
              script: "https://raw.githubusercontent.com/EOEPCA/resource-health/refs/tags/v0.1.0-demo/pytest-health/instrumentation/examples/trivial_check.py"
              annotations:
                owner: "bob"

            - name: hourly-simple-http-check
              schedule: "@hourly"
              # This is an empty requirements file
              requirements: "https://gist.githubusercontent.com/tilowiklundSensmetry/a9fefe2873b731b483f554607a82deaa/raw/1136a82ca3c8f28b1ad4d895871514185927dd1c/requirements.txt"
              script: "https://gist.githubusercontent.com/tilowiklundSensmetry/b75b3bf435e366b2fd5155a41d8f1cb9/raw/892e0e89d078f1f2683b89a1101e31683f77dcee/health_check.py"
              annotations:
                owner: "bob"

            - name: hourly-simple-openeo-check
              schedule: "@hourly"
              requirements: "https://gist.githubusercontent.com/soxofaan/7a634cfb0cc6bc0e8281d152a270ea4e/raw/ef77bc9b2c70cc070259715fea63e288026bb6b8/requirements.txt"
              script: "https://gist.githubusercontent.com/soxofaan/7a634cfb0cc6bc0e8281d152a270ea4e/raw/ef77bc9b2c70cc070259715fea63e288026bb6b8/test_cdse.py"
              annotations:
                owner: "alice"

            - name: daily-data-access-check
              schedule: "0 8 * * *"
              # This is an empty base64 encoding
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/data_access_tests.py?raw=true"
              env:
                - name: DATA_ACCESS_HOST
                  value: https://eoapi.develop.eoepca.org
              annotations:
                owner: "alice"

            - name: daily-iam-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/iam_tests.py?raw=true"
              env:
                - name: OPEN_ID_CONFIGURATION_HOST
                  value: https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known
                - name: OPA_ENDPOINT
                  value: http://iam-opal-opal-client.iam.svc.cluster.local:8181/
                - name: IDENTITY_API_ENDPOINT
                  value: http://identity-api.iam.svc.cluster.local:8080/
              annotations:
                owner: "alice"

            - name: daily-data-mlops-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/mlops_tests.py?raw=true"
              env:
                - name: SHARING_HUB_HOST
                  value: https://sharinghub.develop.eoepca.org
                - name: MFLOW_SHARING_HUB_HOST
                  value: https://sharinghub.p2.csgroup.space
              annotations:
                owner: "alice"

            - name: daily-resource-discovery-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/resource_discovery_tests.py?raw=true"
              env:
                - name: RESOURCE_CATALOGUE_ENDPOINT
                  value: https://resource-catalogue.develop.eoepca.org
              annotations:
                owner: "alice"

            - name: daily-resource-registration-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/resource_registration_tests.py?raw=true"
              env:
                - name: HARVESTER_WORKFLOW_ENGINE_HOST
                  value: https://registration-harvester-api.develop.eoepca.org
                - name: HARVESTER_WORKFLOW_ENGINE_USERNAME
                  value: "eoepca"
                - name: HARVESTER_WORKFLOW_ENGINE_PASSWORD
                  value: "eoepca"
                - name: REGISTRATION_API_ENDPOINT
                  value: https://registration-api.develop.eoepca.org/
              annotations:
                owner: "alice"

            - name: daily-workspace-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/main/pytest-health/lib/BB-examples/workspace_tests.py?raw=true"
              env:
                - name: WORKSPACE_HOST
                  value: https://workspace-api.apx.develop.eoepca.org
              annotations:
                owner: "eric"

            - name: daily-processing-check
              schedule: "0 8 * * *"
              requirements: "data:text/plain;base64,"
              script: "https://github.com/EOEPCA/resource-health/blob/2.0.0-beta2/pytest-health/lib/BB-examples/generic_test.py?raw=true"
              env:
                - name: GENERIC_ENDPOINT
                  value: https://zoo.develop.eoepca.org/swagger-ui/oapip/
                - name: EXPECTED_STATUS_CODE
                  value: "200"
              annotations:
                owner: "eric"

  destination:
    namespace: resource-health
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
