---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openeofed
  namespace: argocd
  labels:
    eoepca/app-name: openeofed
spec:
  project: eoepca
  sources:
    - repoURL: https://artifactory.vgt.vito.be/artifactory/helm-charts
      chart: openeo-aggregator
      targetRevision: 2025.01.10-14
      helm:
        releaseName: openeofed
        valueFiles:
          - $values/argocd/eoepca/openeofed/values-openeofed.yaml
    - repoURL: https://github.com/EOEPCA/eoepca-plus
      targetRevision: deploy-develop
      ref: values
  destination:
    name: in-cluster
    namespace: openeofed
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
