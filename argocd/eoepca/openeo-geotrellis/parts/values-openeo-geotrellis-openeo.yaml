---
#---
# NOTE: This `latest` image seems broken, so reverting to a snapshot image
# that seems to work (snapshot for eoepca release 2.0-beta2)...
image: vito-docker.artifactory.vgt.vito.be/openeo-geotrellis-kube
imageVersion: latest
#image: eoepca/openeo-geotrellis-kube
#imageVersion: 2.0-beta2
#---
imagePullPolicy: Always
sparkVersion: 3.2.0
configMaps:
  backendConfig: |
    from pathlib import Path


    from openeo_driver.urlsigning import UrlSigner
    from openeo_driver.users.oidc import OidcProvider
    from openeogeotrellis.config import GpsBackendConfig
    from openeogeotrellis.deploy import (
        build_gps_backend_deploy_metadata,
        find_geotrellis_jars,
    )


    capabilities_deploy_metadata = build_gps_backend_deploy_metadata(
        packages=[
            "openeo",
            "openeo_driver",
            "openeo-geopyspark",
            "openeo_udf",
            "geopyspark",
        ],
        jar_paths=find_geotrellis_jars(extra_search_locations=[Path("/opt")]),
    )

    oidc_providers = [
        OidcProvider(
            id="eoepca-iam",
            title="EOEPCA IAM",
            issuer="https://iam-auth.apx.develop.eoepca.org/realms/eoepca/",
            default_clients=[
                {
                    "id": "openeo-default-client",
                    "grant_types": [
                        "authorization_code+pkce",
                        "urn:ietf:params:oauth:grant-type:device_code+pkce",
                        "refresh_token",
                    ],
                    "redirect_urls": [
                        "https://editor.openeo.org",
                        "https://eoepca.github.io/processing-editor",
                        "https://editor.apx.develop.eoepca.org",
                        "http://localhost:1410/",
                    ],
                }
            ],
        ),
        OidcProvider(
            id="egi",
            title="EGI Check-in",
            issuer="https://aai.egi.eu/auth/realms/egi/",
            scopes=["openid", "email"],
            default_clients=[
                {
                    "id": "vito-default-client",
                    "grant_types": [
                        "authorization_code+pkce",
                        "urn:ietf:params:oauth:grant-type:device_code+pkce",
                        "refresh_token",
                    ],
                    "redirect_urls": [
                        "https://editor.openeo.org",
                        "https://eoepca.github.io/processing-editor",
                        "https://editor.apx.develop.eoepca.org",
                        "http://localhost:1410/",
                    ],
                }
            ],
        ),
        OidcProvider(
            id="CDSE",
            title="Copernicus Data Space Ecosystem",
            issuer="https://identity.dataspace.copernicus.eu/auth/realms/CDSE/",
            scopes=["openid", "email"],
            default_clients=[
                {
                    "id": "cdse-public",
                    "grant_types": [
                        "authorization_code+pkce",
                        "urn:ietf:params:oauth:grant-type:device_code+pkce",
                        "refresh_token",
                    ],
                    "redirect_urls": [
                        "https://editor.openeo.org",
                        "https://eoepca.github.io/processing-editor",
                        "https://editor.apx.develop.eoepca.org",
                        "http://localhost:1410/",
                    ],
                },
            ],
        ),
        OidcProvider(
            id="egi-dev",
            title="EGI Check-in (dev)",
            issuer="https://aai-dev.egi.eu/auth/realms/egi/",
            default_clients=[
                {
                    "id": "openeo-eoepca-demo",
                    "grant_types": [
                        "authorization_code+pkce",
                        "urn:ietf:params:oauth:grant-type:device_code+pkce",
                        "refresh_token",
                    ],
                    "redirect_urls": [
                        "https://editor.openeo.org",
                        "https://eoepca.github.io/processing-editor",
                        "https://editor.apx.develop.eoepca.org",
                        "http://localhost:1410/",
                    ],
                }
            ],
        ),
    ]

    config = GpsBackendConfig(
        id="eoepca-openeo-demo",
        capabilities_title="Demo openEO/EOEPCA+ service (GeoPySpark)",
        capabilities_description="openEO backend based on GeoPyspark stack for EOEPCA+ demo",
        capabilities_deploy_metadata=capabilities_deploy_metadata,
        oidc_providers=oidc_providers,
        url_signer=UrlSigner(secret="dummy", expiration=7 * 24 * 60 * 60),
    )
  layerCatalog: |
    [
      {
        "id": "TestCollection-LonLat16x16",
        "description": "[DEBUGGING] Fast and predictable layer for debugging purposes. One sample every 5 days. Resolution will vary, to always output 16x16 pixels.",
        "experimental": true,
        "_vito": {"data_source": {"type": "testing"}},
        "cube:dimensions": {
          "x": {"type": "spatial", "axis": "x", "reference_system": 4326},
          "y": {"type": "spatial", "axis": "y", "reference_system": 4326},
          "t": {"type": "temporal"},
          "bands": {
            "type": "bands",
            "values": [
              "Flat:0",
              "Flat:1",
              "Flat:2",
              "TileCol",
              "TileRow",
              "TileColRow:10",
              "Longitude",
              "Latitude",
              "Year",
              "Month",
              "Day"
            ]
          }
        },
        "extent": {
          "spatial": {"bbox": [[-180, -56, 180, 83]]},
          "temporal": {"interval": [["2000-01-01", null]]}
        }
      }
    ]
  log4j2: |
    <Configuration>
        <Appenders>
            <Console name="stdout" target="SYSTEM_OUT">
                <JsonTemplateLayout eventTemplateUri="classpath:OpenEOJsonLogLayout.json"  locationInfoEnabled="true"/>
                <Filters>
                    <!-- this filter allows to print 1 log (maxBurst) every minute (rate) -->
                    <BurstFilter level="warn" rate="0.0166" maxBurst="1"/>
                </Filters>
            </Console>
        </Appenders>
        <Loggers>
            <Logger name="org.openeo.geotrellis.OpenEOProcessScriptBuilder" level="warn"/>
            <Logger name="com.amazonaws.latency" level="warn"/>
            <Logger name="com.amazonaws.request" level="warn"/>
            <Logger name="org.apache.curator" level="warn"/>
            <Logger name="org.apache.hadoop" level="error"/>
            <Logger name="org.apache.spark" level="info"/>
            <Logger name="org.apache.spark.deploy.yarn.ApplicationMaster" level="off"/> <!-- Ignore this: "User application exited with status 1" -->
            <Logger name="org.apache.spark.executor.Executor" level="info"/>
            <Logger name="org.apache.spark.network.server.TransportRequestHandler" level="off"/> <!-- Ignore this: "Could not find CoarseGrainedScheduler." -->
            <Logger name="org.apache.spark.scheduler.TaskSetManager" level="warn"/>
            <Logger name="org.apache.spark.storage.DiskBlockObjectWriter" level="off"/>
            <Logger name="org.apache.zookeeper" level="warn"/>
            <Logger name="org.apache.zookeeper.ClientCnxn" level="error"/> <!-- Ignore this: "Unable to read additional data from server sessionid 0x..., likely server has closed socket" -->
            <Logger name="org.openeo.geotrellis.layers.OpenSearch" level="debug"/>
            <Logger name="org.sparkproject.jetty.server" level="warn"/>
            <Logger name="ucar.nc2.jni.netcdf.Nc4Iosp" level="warn"/>
            <Logger name="software.amazon.awssdk.requestId" level="warn"/>
            <Logger name="software.amazon.awssdk" level="warn"/>
            <Root level="info">
                <AppenderRef ref="stdout"/>
            </Root>
        </Loggers>
    </Configuration>
  customBatchConfig: |
    {% extends "sparkapplication_template.yaml.j2" -%}
    {% block sparkConf %}
        {{ "{{" }} super() }}
        "spark.eventLog.enabled": "false"
        "spark.excludeOnFailure.enabled": "true"
        "spark.excludeOnFailure.killExcludedExecutors": "false"
        "spark.excludeOnFailure.task.maxTaskAttemptsPerExecutor": "2"
        "spark.hadoop.fs.s3a.committer.name": "directory"
        "spark.hadoop.mapreduce.fileoutputcommitter.cleanup-failures.ignored": "true"
        "spark.hadoop.mapreduce.outputcommitter.factory.scheme.file": "org.apache.hadoop.mapreduce.lib.output.committer.manifest.ManifestCommitterFactory"
        "spark.sql.sources.commitProtocolClass": "org.apache.spark.internal.io.cloud.PathOutputCommitProtocol"
        "spark.sql.parquet.output.committer.class": "org.apache.spark.internal.io.cloud.BindingParquetOutputCommitter"
    {% endblock -%}
    {% block driver_labels %}
          {{ "{{" }} super() }}
          role: "driver"
          driver-type: "batch"
          openeo_component: "batchjobs"
          deploy_env: "eoepca"
    {% endblock -%}
    {% block executor_labels %}
          {{ "{{" }} super() }}
          openeo_component: "batchjobs"
          deploy_env: "eoepca"
    {% endblock -%}
    {% block driver_volumeMounts %}
          - mountPath: /opt/backend_config/backendconfig.py
            name: openeo-geotrellis-openeo-sparkapplication-backend-config
            subPath: backendconfig.py
          - mountPath: /opt/layercatalog.json
            name: openeo-geotrellis-openeo-sparkapplication-layercatalog
            subPath: layercatalog.json
          - mountPath: /opt/log4j2.xml
            name: openeo-geotrellis-openeo-sparkapplication-log4j2
            subPath: log4j2.xml
    {% endblock -%}
    {% block executor_volumeMounts %}
          - mountPath: /opt/backend_config/backendconfig.py
            name: openeo-geotrellis-openeo-sparkapplication-backend-config
            subPath: backendconfig.py
          - mountPath: /opt/layercatalog.json
            name: openeo-geotrellis-openeo-sparkapplication-layercatalog
            subPath: layercatalog.json
          - mountPath: /opt/log4j2.xml
            name: openeo-geotrellis-openeo-sparkapplication-log4j2
            subPath: log4j2.xml
    {% endblock -%}
    {% block volumes %}
        {{ "{{" }} super() }}
        - configMap:
            name: openeo-geotrellis-openeo-sparkapplication-backend-config
          name: openeo-geotrellis-openeo-sparkapplication-backend-config
        - configMap:
            name: openeo-geotrellis-openeo-sparkapplication-log4j2
          name: openeo-geotrellis-openeo-sparkapplication-log4j2
        - configMap:
            name: openeo-geotrellis-openeo-sparkapplication-layercatalog
          name: openeo-geotrellis-openeo-sparkapplication-layercatalog
    {% endblock -%}
    {%- block driver_env %}
          {{ "{{" }} super() }}
          - name: SWIFT_ACCESS_KEY_ID
            value: "nSwekdG7oR5ax6rIdZ6D"
          - name: SWIFT_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: openeo-geotrellis-data-bucket-credentials
                key: SWIFT_SECRET_ACCESS_KEY
          - name: EODATA_S3_ENDPOINT
            value: https://eodata.cloudferro.com
          - name: EODATA_ACCESS_KEY_ID
            value: "WGXGQKFBNSLN0FZXRJVG"
          - name: EODATA_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: openeo-geotrellis-eodata-credentials
                key: EODATA_SECRET_ACCESS_KEY
    {% endblock -%}
driver:
  env:
    KUBE: "true"
    KUBE_OPENEO_API_PORT: "50001"
    PYTHONPATH: $PYTHONPATH:/opt/tensorflow/python38/2.3.0/:/opt/openeo/lib/python3.8/site-packages/
    ZOOKEEPERNODES: openeo-geotrellis-zookeeper.openeo-geotrellis.svc.cluster.local:2181
    SWIFT_BUCKET: "openeo-geotrellis-data"
    SWIFT_URL: "https://minio.apx.develop.eoepca.org"
    SWIFT_ACCESS_KEY_ID: "nSwekdG7oR5ax6rIdZ6D"
    EODATA_S3_ENDPOINT: https://eodata.cloudferro.com
    EODATA_ACCESS_KEY_ID: "WGXGQKFBNSLN0FZXRJVG"
  extraEnv:
    - name: EODATA_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: openeo-geotrellis-eodata-credentials
          key: EODATA_SECRET_ACCESS_KEY
    - name: SWIFT_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: openeo-geotrellis-data-bucket-credentials
          key: SWIFT_SECRET_ACCESS_KEY
  podSecurityContext:
    fsGroup: 18585
    fsGroupChangePolicy: Always
executor:
  env:
    PYTHONPATH: $PYTHONPATH:/opt/tensorflow/python38/2.3.0/:/opt/openeo/lib/python3.8/site-packages/
existingConfigMaps: false
fileDependencies:
  - local:///opt/layercatalog.json
  - local:///opt/log4j2.xml
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: apisix
    cert-manager.io/cluster-issuer: letsencrypt-http01-apisix
    apisix.ingress.kubernetes.io/use-regex: "true"
    k8s.apisix.apache.org/upstream-read-timeout: "600s"
    k8s.apisix.apache.org/enable-cors: "true"
    k8s.apisix.apache.org/http-to-https: "true"
    argocd.argoproj.io/ignore-healthcheck: "true"
  hosts:
    - host: openeo.apx.develop.eoepca.org
      paths:
        - /
  tls:
    - hosts:
        - openeo.apx.develop.eoepca.org
      secretName: openeo-geotrellis-openeo-sparkapplication-apx-cert
jarDependencies:
  - local:///opt/geotrellis-extensions-static.jar
  - local:///opt/geotrellis-dependencies-static.jar
mainApplicationFile: local:///opt/openeo/lib64/python3.8/site-packages/openeogeotrellis/deploy/kube.py
sparkConf:
  spark.executorEnv.DRIVER_IMPLEMENTATION_PACKAGE: openeogeotrellis
  spark.appMasterEnv.DRIVER_IMPLEMENTATION_PACKAGE: openeogeotrellis
service:
  enabled: true
  port: 50001
ha:
  enabled: false
rbac:
  create: true
  role:
    rules:
      - apiGroups:
          - ""
        resources:
          - pods
        verbs:
          - create
          - delete
          - deletecollection
          - get
          - list
          - patch
          - watch
      - apiGroups:
          - ""
        resources:
          - services
        verbs:
          - deletecollection
          - list
      - apiGroups:
          - ""
        resources:
          - configmaps
        verbs:
          - create
          - delete
          - deletecollection
          - list
      - apiGroups:
          - sparkoperator.k8s.io
        resources:
          - sparkapplications
        verbs:
          - create
          - delete
          - get
          - list
      - apiGroups:
          - ""
        resources:
          - persistentvolumeclaims
        verbs:
          - create
          - delete
          - deletecollection
          - list
  serviceAccountDriver: openeo
