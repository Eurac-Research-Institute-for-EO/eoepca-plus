apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registration-harvester-worker-landsat
  namespace: argocd
  labels:
    eoepca/app-name: registration-harvester
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: https://eoepca.github.io/helm-charts-dev
      chart: registration-harvester
      targetRevision: 2.0.0-beta2
      helm:
        releaseName: registration-harvester-worker-landsat
        valueFiles:
          - $values/argocd/eoepca/registration-harvester/parts/values/values-landsat.yaml
    - repoURL: https://github.com/EOEPCA/eoepca-plus
      targetRevision: deploy-develop
      ref: values

  destination:
    name: in-cluster
    namespace: registration-harvester-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
