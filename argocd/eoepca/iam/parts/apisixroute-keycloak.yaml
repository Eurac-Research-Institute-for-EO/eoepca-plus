# Note: This file is not needed if Keycloak is deployed via the iam-bb Helm chart,
# because the chart is able to create the route automatically.
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: keycloak-route
  namespace: iam
  annotations:
    ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    argocd.argoproj.io/sync-wave: "2"
spec:
  http:
  - backends:
    - serviceName: iam-keycloak
      servicePort: 80
    match:
      hosts:
      # Take iam as a synonym for iam-auth for now.
      - iam.develop.eoepca.org
      - iam-auth.develop.eoepca.org
      - iam-auth.apx.develop.eoepca.org
      paths:
      - /*
    name: keycloak
