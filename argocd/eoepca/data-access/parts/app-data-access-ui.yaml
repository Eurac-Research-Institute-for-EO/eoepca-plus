apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-access-ui
  namespace: argocd
  labels:
    eoepca/app-name: data-access
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: https://stac-manager.ds.io/
      chart: stac-manager
      targetRevision: 0.0.7
      helm:
        releaseName: stac-manager
        valueFiles:
          - $values/argocd/eoepca/data-access/parts/values/values-stac-manager.yaml
    - repoURL: https://github.com/EOEPCA/eoepca-plus
      targetRevision: deploy-develop
      ref: values
  destination:
    name: in-cluster
    namespace: data-access
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
