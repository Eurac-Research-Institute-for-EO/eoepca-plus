apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: eoapi
  namespace: data-access
spec:
  http:
  - name: stac-manager-route
    backends:
    - serviceName: stac-manager
      servicePort: 9000
    match:
      hosts:
      - eoapi.apx.develop.eoepca.org
      paths:
      - /manager/*
  - name: vector-route
    backends:
    - serviceName: vector
      servicePort: 8080
    match:
      hosts:
      - eoapi.apx.develop.eoepca.org
      paths:
      - /vector/*
    plugins:
    - name: proxy-rewrite
      config:
        regex_uri:
        - ^(/vector)($|/.*)
        - $2
      enable: true
  - name: raster-route
    backends:
    - serviceName: raster
      servicePort: 8080
    match:
      hosts:
      - eoapi.apx.develop.eoepca.org
      paths:
      - /raster/*
    plugins:
    - name: proxy-rewrite
      config:
        regex_uri:
        - ^(/raster)($|/.*)
        - $2
      enable: true
  - name: stac-open-route
    backends:
    - serviceName: stac
      servicePort: 8080
    match:
      hosts:
      - eoapi.apx.develop.eoepca.org
      methods:
      - GET
      paths:
      - /stac
      - /stac/
      - /stac/collections
      - /stac/collections/
      - /stac/collections/public*
    plugins:
    - name: proxy-rewrite
      config:
        regex_uri:
        - ^(/stac)($|/.*)
        - $2
      enable: true
  - name: stac-open-search-route
    backends:
    - serviceName: stac
      servicePort: 8080
    match:
      hosts:
      - eoapi.apx.develop.eoepca.org
      methods:
      - POST
      paths:
      - /stac/search
    plugins:
    - name: proxy-rewrite
      config:
        regex_uri:
        - ^(/stac)($|/.*)
        - $2
      enable: true
  - name: stac-protected-route
    backends:
    - serviceName: stac
      servicePort: 8080
    match:
      hosts:
      - eoapi.apx.develop.eoepca.org
      paths:
      - /stac/*
    plugins:
    - name: proxy-rewrite
      config:
        regex_uri:
        - ^(/stac)($|/.*)
        - $2
      enable: true
    - name: openid-connect
      enable: true
      config:
        discovery: "https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
        bearer_only: false # as we want to redirect to login screen (default: false)
        set_access_token_header: true # required for subsequent OPA check (default: true)
        access_token_in_authorization_header: true # required for subsequent OPA check (default: false)
        set_id_token_header: false # not needed (default: true)
        set_userinfo_header: false # not needed (default: true)
        client_id: eoapi
        client_secret: ""
    - name: opa
      enable: true
      config:
        host: http://iam-opal-opal-client:8181
        policy: eoepca/dataaccess/eoapi
  - name: doc-server-route
    backends:
    - serviceName: doc-server-eoapi
      servicePort: 80
    match:
      hosts:
      - eoapi.apx.develop.eoepca.org
      paths:
      - /*
