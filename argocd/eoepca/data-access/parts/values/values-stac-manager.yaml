ingress:
  enabled: true
  className: nginx
  annotations:
    ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: stac-manager.develop.eoepca.org
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
  - hosts:
      - stac-manager.develop.eoepca.org
    secretName: stac-manager-tls
resources:
  requests:
    memory: "512Mi"
  limits:
    memory: "4Gi"

stacApi: https://eoapi.develop.eoepca.org/stac
