ingress:
  enabled: false

postgresql:
  type: "external-secret"
  external:
    existingSecret:
      name: "default-pguser-eoapi"
      keys:
        username: "user"
        password: "password"
        host: "host"
        port: "port"
        database: "dbname"

postgrescluster:
  enabled: false

pgstacBootstrap:
  enabled: true
  settings:
    pgstacSettings:
      use_queue: "true"
      update_collection_extent: "false"
    envVars:
      KEEP_ALIVE: "false"
  queueProcessor:
    schedule: "0 * * * *"
  extentUpdater:
    schedule: "0 */12 * * *"

raster:
  enabled: true
  ingress:
    path: "/raster"
  overrideRootPath: "/"
  image:
    tag: "1.4.0"
  settings:
    envVars:
      AWS_S3_ENDPOINT: "eodata.cloudferro.com"
      AWS_VIRTUAL_HOSTING: "FALSE"
    envSecrets:
      - data-access
    resources:
      requests:
        memory: "3072Mi"

multidim:
  enabled: true
  ingress:
    path: "/multidim"
  overrideRootPath: "/"
  settings:
    envSecrets:
          - data-access
    resources:
      requests:
        memory: "1024Mi"

stac:
  enabled: true
  settings:
    envVars:
      ENABLE_TRANSACTIONS_EXTENSIONS: "TRUE"
    resources:
      limits:
        cpu: "1280m"
        memory: "1536Mi"
      requests:
        cpu: "512m"

vector:
  enabled: true
  settings:
    resources:
      limits:
        memory: "1536Mi"
      requests:
        memory: "1024Mi"
    envVars:
      # needs to on so we can call /refresh for integration tests
      TIPG_DEBUG: "True"
      TIPG_CATALOG_TTL: "30"

eoapi-notifier:
  enabled: true
  config:
    sources:
      - type: pgstac
        config:
          channel: "pgstac_items_change"
          connection:
            existingSecret:
              name: "default-pguser-eoapi"
              keys:
                username: "user"
                password: "password"
                host: "host"
                port: "port"
                database: "dbname"
    outputs:
      - type: cloudevents
        config:
          source: /eoapi/pgstac
          event_type: org.eoapi.stac.item
          destination:
            ref:
              apiVersion: eventing.knative.dev/v1
              kind: Broker
              name: primary
              namespace: default

stac-auth-proxy:
  enabled: true
  # Custom filters for STAC collections/items filtering
  service:
    port: 8080
  env:
    UPSTREAM_URL: "http://eoapi-stac.data-access.svc.cluster.local:8080"
    OIDC_DISCOVERY_URL: "https://iam-auth.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
    COLLECTIONS_FILTER_CLS: stac_auth_proxy.eoepca_filters:CollectionsFilter
    ITEMS_FILTER_CLS: stac_auth_proxy.eoepca_filters:ItemsFilter
    ROOT_PATH: ""
  extraVolumes:
    - name: filters
      configMap:
        name: stac-auth-proxy-filters
  extraVolumeMounts:
    - name: filters
      mountPath: /app/src/stac_auth_proxy/eoepca_filters.py
      subPath: eoepca_filters.py
      readOnly: true

browser:
  catalogUrl: "https://eoapi.develop.eoepca.org/stac"
