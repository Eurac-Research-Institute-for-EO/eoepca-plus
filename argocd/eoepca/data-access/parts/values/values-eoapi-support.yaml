prometheus-adapter:
  prometheus:
    url: 'http://eoapi-support-prometheus-server.data-access.svc.cluster.local'
grafana:
  service:
    type: ClusterIP
    annotations: {}
  ingress:
    enabled: true
    hosts:
      - eoapisupport.apx.develop.eoepca.org
    annotations:
      kubernetes.io/ingress.class: apisix
      cert-manager.io/cluster-issuer: letsencrypt-http01-apisix
      apisix.ingress.kubernetes.io/use-regex: "true"
      k8s.apisix.apache.org/upstream-read-timeout: "600s"
      k8s.apisix.apache.org/enable-cors: "true"
      k8s.apisix.apache.org/http-to-https: "true"
    tls:
      - secretName: eoapi-support-apx-tls
        hosts:
          - eoapisupport.apx.develop.eoepca.org
  datasources:
    datasources.yaml:
        datasources:
        - name: prometheus
          orgId: 1
          type: prometheus
          url: http://eoapi-support-prometheus-server.data-access.svc.cluster.local
          access: proxy
          jsonData:
            timeInterval: "5s"
          isDefault: true
          editable: true
          version: 2 # This number should be increased when changes are made to update the datasource
prometheus:
  server:
    service:
      annotations: {}
      type: ClusterIP
    persistentVolume:
      enabled: true
      storageClass: "managed-nfs-storage-retain"
      accessModes:
        - ReadWriteMany

enableCaBundleFetch: true
caBundleSecretName: "eoepca-ca-secret"
metrics-server:
  apiService:
    create: true
    insecureSkipTLSVerify: false
  commonAnnotations:
    cert-manager.io/inject-ca-from: cert-manager-ns/eoepca-ca
  extraArgs:
    - --kubelet-insecure-tls=true
    - --kubelet-preferred-address-types=InternalIP

