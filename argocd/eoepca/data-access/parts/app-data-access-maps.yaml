apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-access-maps
  namespace: argocd
  labels:
    eoepca/app-name: data-access
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: https://charts-public.hub.eox.at/
      chart: eoapi-maps-plugin
      targetRevision: 0.0.4
      helm:
        releaseName: eoapi-maps-plugin
        valueFiles:
          - $values/argocd/eoepca/data-access/parts/values/values-eoapi-maps-plugin.yaml
    - repoURL: https://github.com/EOEPCA/eoepca-plus
      targetRevision: deploy-develop
      ref: values

  destination:
    name: in-cluster
    namespace: data-access
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
