# Copied from identity-service and adapted

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knative-operator
  namespace: argocd
  labels:
    eoepca/app-name: knative-operator
spec:
  project: eoepca
  source:
    chart: knative-operator
    repoURL: https://knative.github.io/operator
    targetRevision: v1.19.5
    helm:
      releaseName: knative-operator
  destination:
    name: in-cluster
    namespace: knative-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
