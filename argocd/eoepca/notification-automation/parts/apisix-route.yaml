apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: notifications-wildcard-route
  namespace: knative-eventing
spec:
  http:
  - name: knative-serving-default
    match:
      hosts:
        - "*.notifications.develop.eoepca.org"
      paths:
        - "/*"
    backends:
    - serviceName: kourier
      servicePort: 80
