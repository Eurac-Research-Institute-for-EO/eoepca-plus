---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: openeo-route
  namespace: openeo
spec:
  http:
    # Open access to OpenEO API documentation and discovery endpoints
    - name: openeo-docs
      match:
        hosts:
          - openeo-eurac.develop.eoepca.org
        paths:
          - /*
        exprs:
          - subject:
              scope: Path
            op: RegexMatch
            value: "^/(\\.well-known.*|openeo/1\\.1\\.0/?$|openeo/1\\.1\\.0/\\.well-known.*|openeo/1\\.1\\.0/credentials.*|openeo/1\\.1\\.0/file_formats.*|openeo/1\\.1\\.0/service_types.*|openeo/1\\.1\\.0/udf_runtimes.*|openeo/1\\.1\\.0/collections.*|openeo/1\\.1\\.0/processes.*|openeo/1\\.1\\.0/process_graphs.*|openeo/1\\.1\\.0/conformance.*)"
      backends:
        - serviceName: openeo-openeo-argo
          servicePort: 8000
      plugins:
        # Allow CORS access
        - name: cors
          enable: true
        # Fix URLs and OIDC configuration in response body
        - name: serverless-post-function
          enable: true
          config:
            phase: header_filter
            functions:
              - "return function(conf, ctx)
                  local core = require('apisix.core')
                  local ngx = ngx
                  -- Store original body for rewriting
                  ngx.ctx.api_ctx = ngx.ctx.api_ctx or {}
                  ngx.ctx.api_ctx.need_body_rewrite = true
                end"
        - name: serverless-post-function
          enable: true
          config:
            phase: body_filter
            functions:
              - "return function(conf, ctx)
                  local ngx = ngx
                  local ctx_api = ngx.ctx.api_ctx
                  if ctx_api and ctx_api.need_body_rewrite and ngx.arg[1] then
                    -- Fix localhost URLs
                    local body = ngx.arg[1]
                    body = string.gsub(body, 'http://127%.0%.0%.1:8000/openeo/1%.1%.0/', 'https://openeo-eurac.develop.eoepca.org/openeo/1.1.0/')
                    -- Fix OIDC provider: replace EGI with EURAC Keycloak
                    body = string.gsub(body, '\"id\":\"egi\"', '\"id\":\"eurac-keycloak\"')
                    body = string.gsub(body, '\"issuer\":\"https://aai.egi.eu/auth/realms/egi\"', '\"issuer\":\"https://edp-portal.eurac.edu/auth/realms/edp\"')
                    body = string.gsub(body, '\"title\":\"EGI Check%-in\"', '\"title\":\"EURAC Keycloak\"')
                    ngx.arg[1] = body
                  end
                end"
    # Authorized access to OpenEO API (job submission, user workspaces, etc.)
    - name: openeo-protected
      match:
        hosts:
          - openeo-eurac.develop.eoepca.org
        paths:
          - /*
      backends:
        - serviceName: openeo-openeo-argo
          servicePort: 8000
      plugins:
        # Authn - expect JWT in `Authorization: Bearer` header
        - name: openid-connect
          enable: true
          config:
            client_id: "openEO"
            client_secret: "8f7f2fb0-4347-44be-b5be-d752cbd3de11"
            discovery: "https://edp-portal.eurac.edu/auth/realms/edp/.well-known/openid-configuration"
            scope: "openid email profile"
            realm: edp
            redirect_uri: "https://openeo-eurac.develop.eoepca.org/apisix/redirect"
            session_secret: "d00875a6796744fdb597bd39fb0f4473"
            use_jwks: true
            bearer_only: false
            set_access_token_header: true
            access_token_in_authorization_header: true
            unauth_action: "auth"
            timeout: 30
            ssl_verify: false
            set_userinfo_header: true
            response_type: "code"
            access_token_expires_in: 3600
            access_token_expires_leeway: 60
            refresh_session_interval: 900
        # Allow CORS access
        - name: cors
          enable: true
        # Increase timeout for long-running operations
        - name: proxy-rewrite
          enable: true
          config:
            headers:
              set:
                X-Request-Id: "$request_id"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openeo-tls
  namespace: openeo
spec:
  dnsNames:
    - openeo-eurac.develop.eoepca.org
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-prod
  secretName: openeo-tls
  usages:
    - digital signature
    - key encipherment
    - server auth
---
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: openeo
  namespace: openeo
spec:
  hosts:
    - openeo-eurac.develop.eoepca.org
  secret:
    name: openeo-tls
    namespace: openeo
