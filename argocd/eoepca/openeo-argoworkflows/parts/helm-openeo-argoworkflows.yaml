apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openeo-argoworkflows-core
  namespace: argocd
  labels:
    eoepca/app-name: openeo-argoworkflows
spec:
  project: eoepca
  source:
    repoURL: https://github.com/jzvolensky/charts
    targetRevision: main
    path: eodc/openeo-argo
    helm:
      releaseName: openeo
      valuesObject:
        global:
          env:
            alembicDir: "/opt/openeo_argoworkflows_api/psql"
            apiDns: openeo-eurac.develop.eoepca.org
            apiTLS: true
            apiTitle: "OpenEO ArgoWorkflows"
            apiDescription: "A K8S deployment of the openeo api for argoworkflows."
            oidcUrl: "https://edp-portal.eurac.edu/auth/realms/edp"
            oidcClientId: "openEO"
            oidcClientSecret: ""
            odicOrganisation: "eurac"
            oidcPolicies: ""
            stacCatalogueUrl: "https://stac.eodc.eu/api/v1"
            workspaceRoot: "/user_workspaces"
            executorImage: "ghcr.io/eodcgmbh/openeo-argoworkflows:executor-2025.5.1"
            daskWorkerCores: "4"
            daskWorkerMemory: "8"
            daskWorkerLimit: "6"
            daskClusterTimeout: "3600"

        replicaCount: 1

        image:
          repository: ghcr.io/eodcgmbh/openeo-argoworkflows
          pullPolicy: IfNotPresent
          tag: "api-2025.5.1"

        postgresql:
          enabled: true
          image:
            repository: bitnamilegacy/postgresql
          auth:
            username: "postgres"
            password: "openeo123"
            database: "postgres"
          persistence:
            size: "8Gi"

        redis:
          image:
            repository: bitnamilegacy/redis
          persistence:
            size: "8Gi"
          replicas:
            enabled: true
            count: 1

        service:
          type: ClusterIP
          port: 8000

        ingress:
          enabled: false

        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi

        autoscaling:
          enabled: false

        nodeSelector: {}
        tolerations: []
        affinity: {}

  destination:
    name: in-cluster
    namespace: openeo
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
