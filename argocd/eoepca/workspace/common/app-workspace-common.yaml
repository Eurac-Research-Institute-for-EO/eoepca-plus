apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workspace-common
  namespace: argocd
  labels:
    eoepca/is-root-app: "true"
    eoepca/app-name: workspace
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  source:
    repoURL: https://github.com/EOEPCA/eoepca-plus
    targetRevision: deploy-develop
    path: argocd/eoepca/workspace/common/parts
  destination:
    name: in-cluster
    namespace: workspace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
