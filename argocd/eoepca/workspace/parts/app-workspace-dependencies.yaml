apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workspace-dependencies
  namespace: argocd
  labels:
    eoepca/app-name: workspace-dependencies
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  source:
    repoURL: oci://ghcr.io/versioneer-tech/bases
    targetRevision: csi-rclone-8c7446a76eb5
    path: .
    kustomize:
      patches:
        - target:
            group: rbac.authorization.k8s.io
            version: v1
            kind: ClusterRoleBinding
            name: csi-rclone-attacher-role
          patch: |
            - op: add
              path: /subjects/0/namespace
              value: workspace
        - target:
            group: rbac.authorization.k8s.io
            version: v1
            kind: ClusterRoleBinding
            name: csi-rclone-nodeplugin
          patch: |
            - op: add
              path: /subjects/0/namespace
              value: workspace
        - target:
            group: rbac.authorization.k8s.io
            version: v1
            kind: ClusterRoleBinding
            name: csi-rclone-provisioner-role
          patch: |
            - op: add
              path: /subjects/0/namespace
              value: workspace
  destination:
    name: in-cluster
    namespace: workspace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
