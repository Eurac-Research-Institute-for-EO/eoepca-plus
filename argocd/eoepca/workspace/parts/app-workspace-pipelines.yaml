apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workspace-pipelines
  namespace: argocd
  labels:
    eoepca/app-name: workspace
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: https://github.com/EOEPCA/workspace
      targetRevision: main
      path: setup/prerequisites
    - repoURL: https://github.com/EOEPCA/workspace
      targetRevision: main
      path: setup/storage/minio
    - repoURL: https://github.com/EOEPCA/workspace
      targetRevision: main
      path: setup/workspace/vcluster
  destination:
    name: in-cluster
    namespace: workspace
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
