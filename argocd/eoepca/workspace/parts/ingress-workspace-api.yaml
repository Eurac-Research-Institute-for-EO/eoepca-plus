---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: workspace-api
spec:
  http:
    - name: workspace-api-docs
      backends:
        - serviceName: workspace-api
          servicePort: 8080
      match:
        hosts:
          - workspace-api.apx.develop.eoepca.org
        paths:
          - /docs
          - /openapi.json
        exprs:
          - subject:
              scope: Path
            op: RegexMatch
            value: "^/(docs(/.*|$)|openapi.json$)"
    - name: workspace-api
      backends:
        - serviceName: workspace-api
          servicePort: 8080
      match:
        hosts:
          - workspace-api.apx.develop.eoepca.org
        paths:
          - /*
      plugins:
        - name: authz-keycloak
          enable: true
          config:
            client_id: "workspace-bb"
            client_secret: "nbUmFfzQdfcYiLw0Mo5OMzSaKQfZBv3U"
            discovery: "https://iam-auth.develop.eoepca.org/realms/eoepca/.well-known/uma2-configuration"
            lazy_load_paths: true
            ssl_verify: false
        # - name: redirect
        #   enable: true
        #   config:
        #     http_to_https: true
