---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: workspace-api
  namespace: workspace
spec:
  http:
    - name: workspace-api-no-auth
      match:
        hosts:
          - workspace-api.apx.develop.eoepca.org
        paths:
          - "/metrics*"
          - "/probe*"
      backends:
        - serviceName: workspace-api
          servicePort: 8080
      plugins: []
    - name: workspace-api-debug
      match:
        hosts:
          - workspace-api.apx.develop.eoepca.org
        paths:
          - /debug*
      backends:
        - serviceName: workspace-api
          servicePort: 8080
      plugins:
        - name: openid-connect
          enable: true
          config:
            discovery: "https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
            use_jwks: true
            bearer_only: false
            set_access_token_header: false
            access_token_in_authorization_header: false
            set_id_token_header: true
            set_userinfo_header: true
          secretRef: workspace-api
        # - name: serverless-pre-function
        #   config:
        #     phase: rewrite
        #     functions:
        #       - |
        #         ngx.log(ngx.ERR, "TEST: serverless-pre-function executed")
        #         ngx.exit(500)
    - name: workspace-api-docs
      match:
        hosts:
          - workspace-api.apx.develop.eoepca.org
        paths:
          - /docs*
          - /openapi.json*
      backends:
        - serviceName: workspace-api
          servicePort: 8080
      # plugins:
      #   - name: openid-connect
      #     enable: true
      #     config:
      #       access_token_in_authorization_header: true
      #       discovery: "https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
      #     secretRef: workspace-api
    - name: workspace-api-admin
      match:  
        hosts:
          - workspace-api.apx.develop.eoepca.org
        paths:
          - /workspaces
          - /workspaces/*
        methods:
          - POST
          - DELETE
      backends:
        - serviceName: workspace-api
          servicePort: 8080
      plugins:
        - name: authz-keycloak
          enable: true
          config:
            discovery: https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known/uma2-configuration
            lazy_load_paths: true
            ssl_verify: false
          secretRef: workspace-api
    - name: workspace-api-user
      match:
        hosts:
          - workspace-api.apx.develop.eoepca.org
        paths:
          - /*
      backends:
        - serviceName: workspace-api
          servicePort: 8080
      plugins:
        - name: openid-connect
          enable: true
          config:
            discovery: "https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
            use_jwks: true
            bearer_only: false
            set_access_token_header: true
            access_token_in_authorization_header: true
            set_id_token_header: false
            set_userinfo_header: false
          secretRef: workspace-api
        - name: opa
          enable: true
          config:
            host: http://iam-opal-opal-client.iam:8181
            policy: eoepca/workspace/wsapi