apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workspace-setup-storage-init
  namespace: argocd
  labels:
    eoepca/app-name: workspace
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: https://github.com/EOEPCA/workspace
      targetRevision: main
      path: setup/storage/minio/init
  destination:
    name: in-cluster
    namespace: workspace
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
