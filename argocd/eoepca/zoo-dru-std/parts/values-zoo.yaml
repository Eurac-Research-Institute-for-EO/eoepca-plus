cookiecutter:
  templateUrl: https://github.com/gfenoy/eoepca-proc-service-template.git
  templateBranch: feature/output-handling
zoo:
  openapi:
    enabled: true
zoofpm:
  image:
    tag: eoepca-39b6fc74b6592b4584be5a0b2740dde11a1ffafc
zookernel:
  env:
    ZOO_OUTPUT_FORMAT: "stac-collection"
  image:
    tag: eoepca-39b6fc74b6592b4584be5a0b2740dde11a1ffafc
customConfig:
  main:
    eoepca: |-
      domain=develop.eoepca.org
      workspace_url=https://workspace-api.develop.eoepca.org
      workspace_prefix=ws
      workspace_catalog_register=false
workflow:
  defaultMaxRam: 1024
  defaultMaxCores: 2
  inputs:
    STAGEIN_AWS_SERVICEURL: http://eodata.cloudferro.com
    STAGEIN_AWS_ACCESS_KEY_ID: 4SMIGZNCR8LM1LSUY1HU
    STAGEIN_AWS_SECRET_ACCESS_KEY: MBiw2FOddg3Fs2Rm9NoDy10qufvJ4hzjmlQ1qwzV
    STAGEIN_AWS_REGION: WAW3-2
    STAGEOUT_AWS_SERVICEURL: https://minio.develop.eoepca.org
    STAGEOUT_AWS_ACCESS_KEY_ID: eoepca
    STAGEOUT_AWS_SECRET_ACCESS_KEY: changeme
    STAGEOUT_AWS_REGION: RegionOne
    STAGEOUT_OUTPUT: eoepca
  nodeSelector: {}
  storageClass: managed-nfs-storage-retain
ingress:
  enabled: false
  hosturl: https://zoostd.develop.eoepca.org
  annotations:
    kubernetes.io/ingress.class: apisix
    ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-dns-prod
    argocd.argoproj.io/ignore-healthcheck: "true"
  hosts:
  - host: zoostd.develop.eoepca.org
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls:
  - hosts:
    - zoostd.develop.eoepca.org
    secretName: zoostd-tls
persistence:
  procServicesStorageClass: managed-nfs-storage-retain
  storageClass: managed-nfs-storage-retain
  tmpStorageClass: managed-nfs-storage
postgresql:
  primary:
    persistence:
      storageClass: managed-nfs-storage-retain
  readReplicas:
    persistence:
      storageClass: managed-nfs-storage-retain
rabbitmq:
  persistence:
    storageClass: managed-nfs-storage-retain
iam:
  enabled: false
documentation:
  enabled: true
