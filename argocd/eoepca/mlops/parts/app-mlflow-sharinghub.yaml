apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow-sharinghub
  namespace: argocd
spec:
  destination:
    namespace: sharinghub
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/csgroup-oss/mlflow-sharinghub.git
    path: deploy/helm/mlflow-sharinghub
    targetRevision: "0.2.0"
    helm:
      valuesObject:
        image:
          repository: eoepca/mlflow-sharinghub
          pullPolicy: Always

        mlflowSharinghub:
          sharinghubUrl: https://apx.develop.eoepca.org/sharinghub
          sharinghubStacCollection: ai-model
          sharinghubAuthDefaultToken: false
          artifactsDestination: s3://mlopsbb-mlflow-sharinghub

        s3:
          enabled: true
          endpointUrl: https://minio.apx.develop.eoepca.org

        persistence:
          enabled: false

        podSecurityContext:
          fsGroup: 999

        ingress:
          enabled: false
          
        postgresql:
          enabled: true
          auth:
            existingSecret: mlflow-sharinghub-postgres
          global:
            storageClass: managed-nfs-storage

  syncPolicy:
    syncOptions:
      - FailOnSharedResource=true
      - CreateNamespace=true
