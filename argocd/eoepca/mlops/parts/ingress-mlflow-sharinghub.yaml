apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: mlflow-sharinghub
  namespace: sharinghub
spec:
  http:
  - name: mlflow-sharinghub
    match:
      hosts:
      - develop.eoepca.org
      paths:
      - /mlflow
      - /mlflow/*
    backends:
    - serviceName: mlflow-sharinghub
      servicePort: 5000
    plugins:
    - name: cors
      enable: true
    - name: proxy-timeout
      enable: true
      config:
        read: 600
    - name: proxy-rewrite
      enable: true
      config:
        regex_uri:
          - ^/mlflow($|/)(.*)
          - /$2
        scheme: https
        headers:
          set:
            X-Script-Name: /mlflow
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mlflow-sharinghub-tls
  namespace: sharinghub
spec:
  dnsNames:
    - develop.eoepca.org
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-http01-apisix
  secretName: sharinghub-develop.eoepca.org-tls
  usages:
    - digital signature
    - key encipherment
    - server auth
---
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: mlflow-sharinghub-tls
  namespace: sharinghub
spec:
  hosts:
    - develop.eoepca.org
  secret:
    name: sharinghub-develop.eoepca.org-tls
    namespace: sharinghub
