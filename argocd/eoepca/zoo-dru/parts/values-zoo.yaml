cookiecutter:
  templateUrl: https://github.com/EOEPCA/eoepca-proc-service-template.git
  # templateBranch: feature/python3.8
  templateBranch: feature/optional-catalogue-registration
zoofpm:
  image:
    tag: eoepca-e912be9fd38445c7416a2b4b3d749b1ae67247ea
zookernel:
  env:
    ZOO_OUTPUT_FORMAT: "stac-collection"
  image:
    tag: eoepca-e912be9fd38445c7416a2b4b3d749b1ae67247ea
customConfig:
  main:
    eoepca: |-
      domain=apx.develop.eoepca.org
      workspace_url=https://workspace-api.apx.develop.eoepca.org
      workspace_prefix=ws
      workspace_catalog_register=false
workflow:
  defaultMaxRam: 1024
  defaultMaxCores: 2
  inputs:
    STAGEIN_AWS_SERVICEURL: http://eodata.cloudferro.com
    STAGEIN_AWS_ACCESS_KEY_ID: 4SMIGZNCR8LM1LSUY1HU
    STAGEIN_AWS_SECRET_ACCESS_KEY: MBiw2FOddg3Fs2Rm9NoDy10qufvJ4hzjmlQ1qwzV
    STAGEIN_AWS_REGION: WAW3-2
    STAGEOUT_AWS_SERVICEURL: https://minio.develop.eoepca.org
    STAGEOUT_AWS_ACCESS_KEY_ID: eoepca
    STAGEOUT_AWS_SECRET_ACCESS_KEY: changeme
    STAGEOUT_AWS_REGION: RegionOne
    STAGEOUT_OUTPUT: eoepca
  nodeSelector: {}
  storageClass: managed-nfs-storage-retain
ingress:
  enabled: false
  hosturl: https://zoo.apx.develop.eoepca.org
  annotations:
    kubernetes.io/ingress.class: apisix
    ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-dns-prod
  hosts:
  - host: zoo.apx.develop.eoepca.org
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls:
  - hosts:
    - zoo.apx.develop.eoepca.org
    secretName: zoo-tls
persistence:
  procServicesStorageClass: managed-nfs-storage-retain
  storageClass: managed-nfs-storage-retain
  tmpStorageClass: managed-nfs-storage
postgresql:
  primary:
    persistence:
      storageClass: managed-nfs-storage-retain
  readReplicas:
    persistence:
      storageClass: managed-nfs-storage-retain
rabbitmq:
  persistence:
    storageClass: managed-nfs-storage-retain
iam:
  enabled: false
documentation:
  enabled: true
