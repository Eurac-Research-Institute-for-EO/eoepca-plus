apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: resource-catalogue-route
  namespace: rm
  annotations:
    ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    argocd.argoproj.io/sync-wave: "2"
spec:
  http:
  - name: resource-catalogue-protected
    match:
      hosts:
        - resource-catalogue-protected.develop.eoepca.org
      paths:
        - /*
    backends:
      - serviceName: resource-catalogue-service
        servicePort: 80
    plugins:
      # TODO: Configure client secrets through secretRef
      - name: openid-connect
        enable: true
        config:
          client_id: "TBD"
          client_secret: "TBD"
          access_token_in_authorization_header: true
          discovery: "https://iam-auth.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
      - name: authz-keycloak
        enable: true
        config:
          client_id: "TBD"
          client_secret: "TBD"
          discovery: "https://iam-auth.develop.eoepca.org/realms/eoepca/.well-known/uma2-configuration"
          lazy_load_paths: true
          ssl_verify: false
      - name: cors
        enable: true
  - name: resource-catalogue-open
    match:
      hosts:
        - resource-catalogue.develop.eoepca.org
      paths:
        - /*
    backends:
      - serviceName: resource-catalogue-service
        servicePort: 80
    plugins:
      - name: cors
        enable: true
