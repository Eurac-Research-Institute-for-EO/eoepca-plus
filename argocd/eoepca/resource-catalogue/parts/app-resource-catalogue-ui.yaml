apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-catalogue-ui
  namespace: argocd
  labels:
    eoepca/app-name: resource-catalogue
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: https://eoepca.github.io/helm-charts-dev/
      chart: stac-manager
      targetRevision: 0.0.1
      helm:
        releaseName: stac-manager
        valueFiles:
          - $values/argocd/eoepca/resource-catalogue/parts/values/values-stac-manager.yaml
    - repoURL: https://github.com/EOEPCA/eoepca-plus
      targetRevision: deploy-develop
      ref: values
  destination:
    name: in-cluster
    namespace: rm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
