apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datacube-access-core
  namespace: argocd
  labels:
    eoepca/app-name: datacube-access-core
spec:
  # Ref. https://argo-cd.readthedocs.io/en/stable/user-guide/application-specification/
  project: eoepca
  sources:
    - repoURL: https://charts-public.hub.eox.at/
      chart: datacube-access
      targetRevision: 0.0.0
      helm:
        releaseName: datacube-access
        valueFiles:
          - $values/argocd/eoepca/datacube-access/parts/values/values-datacube-access-core.yaml
    - repoURL: https://github.com/EOEPCA/eoepca-plus
      targetRevision: deploy-develop
      ref: values

  destination:
    name: in-cluster
    namespace: datacube-access
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
