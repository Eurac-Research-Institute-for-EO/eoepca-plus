---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: zoo-route
  namespace: zoowes
spec:
  http:
    # Backdoor for open access
    - name: zoowes-open
      match:
        hosts:
          - zoowes-open.apx.develop.eoepca.org
        paths:
          - /*
      backends:
        - serviceName: zoo-project-dru-wes-service
          servicePort: 80
      plugins:
        # Allow CORS access
        - name: cors
          enable: true
    # Open access to zoo OpenAPI docs
    - name: zoowes-docs
      match:
        hosts:
          - zoowes.apx.develop.eoepca.org
        paths:
          - /*
        exprs:
          - subject:
              scope: Path
            op: RegexMatch
            value: "^/(ogc-api/api.*|swagger-ui.*|conformance.*)"
      backends:
        - serviceName: zoo-project-dru-wes-service
          servicePort: 80
      plugins:
        # Allow CORS access
        - name: cors
          enable: true
    # Authorized access to zoo API
    - name: zoowes-protected
      match:
        hosts:
          - zoowes.apx.develop.eoepca.org
        paths:
          - /*
      backends:
        - serviceName: zoo-project-dru-wes-service
          servicePort: 80
      plugins:
        # Authn - expect JWT in `Authorization: Bearer` header
        - name: openid-connect
          enable: true
          config:
            client_id: "zoo"
            client_secret: "Fsw9DtGQ52lje15lQtPC8CDxhpwqE8Di"
            discovery: "https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known/openid-configuration"
            realm: eoepca
            bearer_only: true
        # Authz
        - name: authz-keycloak
          enable: true
          config:
            client_id: "zoo"
            client_secret: "Fsw9DtGQ52lje15lQtPC8CDxhpwqE8Di"
            discovery: "https://iam-auth.apx.develop.eoepca.org/realms/eoepca/.well-known/uma2-configuration"
            lazy_load_paths: true
            ssl_verify: false
        # Allow CORS access
        - name: cors
          enable: true
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zoo-apx-tls
spec:
  dnsNames:
    - zoowes.apx.develop.eoepca.org
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-prod
  secretName: zoo-apx-tls
  usages:
    - digital signature
    - key encipherment
    - server auth
---
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: zoo-apx
spec:
  hosts:
    - zoowes.apx.develop.eoepca.org
  secret:
    name: zoo-apx-tls
    namespace: zoowes
