---
image:
  #pullPolicy: Always
  registry: docker.io
  repository: eoepca/processing-editor
  tag: sha-b2c2441
replicaCount: 1
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: editor.develop.eoepca.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: openeo-web-editor-cert
      hosts:
        - editor.develop.eoepca.org
