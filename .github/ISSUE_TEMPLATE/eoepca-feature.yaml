name: EOEPCA+ Feature Request
description: Submit a Feature Request
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a new feature
  - type: dropdown
    id: building-block
    attributes:
      label: Building Block
      description: To which building block(s) does the new feature apply? (multi selection supported)
      multiple: true
      options:
        - System
        - Resource Discovery
        - Resource Registration
        - Data Access
        - Datacube Access
        - Workspace
        - Processing
        - MLOps
        - Resource Health
        - Notification & Automation
        - Data Gateway
        - Federated Orchestrator
        - Identity & Access Management
        - Application Hub
        - Application Quality
  - type: textarea
    id: details
    attributes:
      label: Feature description
      description: Provide full details of the requested feature
      placeholder:  Please provide as much information as possible
    validations:
      required: true
