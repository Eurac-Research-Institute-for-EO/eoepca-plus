# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: ▶️ Run Smoke Tests

on:
  # via github UI
  workflow_dispatch:
  # commits
  push:
    branches:
      - deploy-*

jobs:
  debugging:
    name: Debugging
    runs-on: ubuntu-latest
    environment: develop
    env:
      OAPIP_CLIENT_SECRET: ${{ secrets.OAPIP_CLIENT_SECRET }}
    steps:
      - run: |
          echo "SECRET: ${{ secrets.OAPIP_CLIENT_SECRET }}"
          echo "SECRET (from env): ${{ env.OAPIP_CLIENT_SECRET }}"

  debugging-no-env:
    name: Debugging (no env)
    runs-on: ubuntu-latest
    env:
      OAPIP_CLIENT_SECRET: ${{ secrets.OAPIP_CLIENT_SECRET }}
    steps:
      - run: |
          echo "SECRET: ${{ secrets.OAPIP_CLIENT_SECRET }}"
          echo "SECRET (from env): ${{ env.OAPIP_CLIENT_SECRET }}"

  # deduce-environment:
  #   name: Deduce the GitHub Environment
  #   runs-on: ubuntu-latest
  #   outputs:
  #     environment: ${{ steps.deduce.outputs.environment }}
  #   steps:
  #     - name: Extract environment name
  #       id: deduce
  #       run: echo "environment=${BRANCH#deploy-}" >> $GITHUB_OUTPUT
  #       env:
  #         BRANCH: ${{ github.ref_name }}
                  
  run-smoke-tests:
    environment: develop
    uses: ./.github/workflows/run-tests.yaml
    secrets: inherit
    with:
      pytest-options: "-m smoketest"
      environment: develop
