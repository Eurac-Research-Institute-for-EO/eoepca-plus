# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Run Smoke Tests

on:
  # via github UI
  workflow_dispatch:
  # commits
  push:
    branches:
      - deploy-*

jobs:
  deduce-environment:
    name: Deduce the GitHub Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.deduce.outputs.environment }}
    steps:
      - name: Extract environment name
        id: deduce
        run: echo "::set-output name=environment::${BRANCH#deploy-}"
        env:
          BRANCH: ${{ github.ref_name }}

  run-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: deduce-environment
    environment: ${{ needs.deduce-environment.outputs.environment }}
    env:
      ENVIRONMENT: ${{ needs.deduce-environment.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare pytest env file
        uses: tvarohohlavy/inplace-envsubst-action@v1.0.0
        env:
          OAPIP_CLIENT_SECRET: ${{ secrets.OAPIP_CLIENT_SECRET }}
        with:
          variables: |
            $OAPIP_CLIENT_SECRET
          files: |
            pytest.env

      - name: Check envsubst
        run: |
          cat pytest.env

      - name: Invoke pytest
        run: |
          echo "TARGET is ${{ env.ENVIRONMENT }}"
          docker run --rm -t \
            -e target=${{ env.ENVIRONMENT }} \
            -v ./pytest.env:/work/test/.env.${{ env.ENVIRONMENT }} \
            -v ./out:/work/out \
            eoepca/system-test \
            pytest test -m smoketest -v --junit-xml=out/report.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            out/**/*.xml
