# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: ♻️ Run Tests

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment"
        required: true
        type: string
      pytest-options:
        description: "Additional options for pytest"
        required: false
        type: string

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      FRED: bob
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare pytest env file
        uses: tvarohohlavy/inplace-envsubst-action@v1.0.0
        env:
          OAPIP_CLIENT_SECRET: ${{ secrets.OAPIP_CLIENT_SECRET }}
        with:
          variables: |
            $OAPIP_CLIENT_SECRET
          files: |
            pytest.env

      - name: Debug GitHub Action
        env:
          OAPIP_CLIENT_SECRET: ${{ secrets.OAPIP_CLIENT_SECRET }}
        run: |
          echo "ENVIRONMENT value: ${{ inputs.environment }}"
          echo "ENVIRONMENT value (from env): ${{ env.ENVIRONMENT }}"
          echo "FRED value (from env): ${{ env.FRED }}"
          echo "SECRET value: ${{ secrets.OAPIP_CLIENT_SECRET }}"
          echo "SECRET value (from env): $OAPIP_CLIENT_SECRET"
          echo "pytest.env..."
          cat pytest.env

      - name: Invoke pytest
        run: |
          echo "TARGET is ${{ env.ENVIRONMENT }}"
          docker run --rm -t \
            -e target=${{ env.ENVIRONMENT }} \
            -v ./pytest.env:/work/test/.env.${{ env.ENVIRONMENT }} \
            -v ./out:/work/out \
            eoepca/system-test \
            pytest test ${{ inputs.pytest-options }} -v --junit-xml=out/report.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            out/**/*.xml
